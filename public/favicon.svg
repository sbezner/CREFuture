<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0e27"/>

  <!-- Outer circle gradient effect -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>

  <!-- Inner geometric shape - representing AI -->
  <g transform="translate(50, 50)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="8" fill="#ff006e"/>

    <!-- Connected nodes -->
    <circle cx="20" cy="0" r="6" fill="#00d4ff"/>
    <circle cx="-20" cy="0" r="6" fill="#00d4ff"/>
    <circle cx="0" cy="20" r="6" fill="#00d4ff"/>
    <circle cx="0" cy="-20" r="6" fill="#00d4ff"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="20" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-20" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>

    <!-- Accent color on top -->
    <circle cx="0" cy="-20" r="6" fill="#ffd60a"/>
  </g>
</svg>
